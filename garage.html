<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Garage</title>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body { width: 100%; height: 100%; overflow: hidden; background: #08060f; font-family: 'Inter', system-ui, sans-serif; color: #fff; }

		#viewer-canvas {
			position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
		}

		/* Top bar */
		#top-bar {
			position: fixed; top: 0; left: 0; right: 0; z-index: 10;
			height: 44px; display: flex; align-items: center; justify-content: space-between;
			padding: 0 16px;
			background: linear-gradient(180deg, rgba(10,8,18,0.92) 0%, rgba(10,8,18,0) 100%);
			pointer-events: none;
		}
		#top-bar > * { pointer-events: auto; }
		#top-bar h1 {
			font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600;
			letter-spacing: 2px; text-transform: uppercase; color: rgba(139,92,246,0.9);
		}
		#top-bar nav a {
			color: rgba(255,255,255,0.5); text-decoration: none; font-size: 12px;
			font-family: 'JetBrains Mono', monospace; margin-left: 16px;
			transition: color 0.15s;
		}
		#top-bar nav a:hover { color: #fff; }

		/* Sidebar */
		#sidebar {
			position: fixed; top: 52px; left: 12px; bottom: 60px; width: 300px; z-index: 10;
			background: rgba(10,8,18,0.92); backdrop-filter: blur(12px);
			border: 1px solid rgba(139,92,246,0.12); border-radius: 6px;
			overflow-y: auto; overflow-x: hidden;
			padding: 8px 0;
		}
		#sidebar::-webkit-scrollbar { width: 5px; }
		#sidebar::-webkit-scrollbar-track { background: transparent; }
		#sidebar::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.3); border-radius: 3px; }

		/* Sections */
		.garage-section { border-bottom: 1px solid rgba(139,92,246,0.08); }
		.garage-section:last-child { border-bottom: none; }
		.section-header {
			display: flex; align-items: center; justify-content: space-between;
			padding: 10px 14px; cursor: pointer; user-select: none;
			transition: background 0.12s;
		}
		.section-header:hover { background: rgba(139,92,246,0.06); }
		.section-title {
			font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
			color: #fff; letter-spacing: 0.5px;
		}
		.section-chevron {
			font-size: 10px; color: rgba(139,92,246,0.6);
			transition: transform 0.2s;
		}
		.section-chevron.collapsed { transform: rotate(-90deg); }
		.section-body { padding: 4px 14px 12px; }
		.section-body.collapsed { display: none; }

		/* Field row */
		.field-row {
			display: flex; align-items: center; justify-content: space-between;
			margin-bottom: 8px;
		}
		.field-label {
			font-family: 'JetBrains Mono', monospace; font-size: 9px;
			color: rgba(139,92,246,0.65); text-transform: uppercase;
			letter-spacing: 1px; flex-shrink: 0;
		}
		.field-input {
			width: 80px; padding: 4px 8px; text-align: right;
			background: rgba(10,8,18,0.9); border: 1px solid rgba(139,92,246,0.15);
			border-radius: 3px; color: #fff;
			font-family: 'JetBrains Mono', monospace; font-size: 11px;
			outline: none; transition: border-color 0.15s;
		}
		.field-input:focus { border-color: rgba(139,92,246,0.5); }
		.field-input::-webkit-inner-spin-button { opacity: 0.3; }

		/* Torque curve canvas */
		#torque-curve-canvas {
			width: 100%; height: 80px; border-radius: 4px;
			background: rgba(10,8,18,0.9); border: 1px solid rgba(139,92,246,0.1);
			margin-top: 4px;
		}

		/* Reset button */
		.reset-btn {
			display: block; width: calc(100% - 4px); margin: 8px 2px 4px;
			padding: 6px; border: 1px solid rgba(139,92,246,0.15);
			border-radius: 3px; background: rgba(139,92,246,0.06);
			color: rgba(255,255,255,0.5); font-family: 'JetBrains Mono', monospace;
			font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
			cursor: pointer; transition: all 0.15s;
		}
		.reset-btn:hover { background: rgba(139,92,246,0.12); color: #fff; }

		/* Bottom action bar */
		#action-bar {
			position: fixed; bottom: 12px; left: 12px; right: 12px; z-index: 10;
			display: flex; gap: 10px; justify-content: center;
			pointer-events: none;
		}
		#action-bar > * { pointer-events: auto; }
		.action-btn {
			padding: 10px 28px; border: none; border-radius: 4px;
			font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
			cursor: pointer; transition: all 0.15s; letter-spacing: 0.3px;
		}
		.btn-primary {
			background: rgba(139,92,246,0.8); color: #fff;
		}
		.btn-primary:hover { background: rgba(139,92,246,1); }
		.btn-secondary {
			background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7);
			border: 1px solid rgba(139,92,246,0.15);
		}
		.btn-secondary:hover { background: rgba(255,255,255,0.1); color: #fff; }
	</style>
</head>
<body>
	<canvas id="viewer-canvas"></canvas>

	<div id="top-bar">
		<h1>Garage</h1>
		<nav>
			<a id="nav-practice" href="/practice">Practice</a>
			<a id="nav-world" href="/world">World</a>
		</nav>
	</div>

	<div id="sidebar"></div>

	<div id="action-bar">
		<button class="action-btn btn-secondary" id="btn-back">Back to World</button>
		<button class="action-btn btn-primary" id="btn-drive">Drive This Car</button>
	</div>

	<script type="module">
		import "./src/client/ui/index.ts";
	</script>
	<script type="module" src="/src/client/garage.ts"></script>
</body>
</html>
