<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Racing — Practice</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: system-ui, sans-serif; }
		canvas { display: block; width: 100%; height: 100%; }

		#hud {
			position: fixed;
			bottom: 20px;
			left: 50%;
			transform: translateX(-50%);
			display: flex;
			gap: 20px;
			align-items: flex-end;
			pointer-events: none;
			z-index: 10;
		}

		.hud-panel {
			background: rgba(0,0,0,0.6);
			color: #fff;
			padding: 10px 16px;
			border-radius: 8px;
			backdrop-filter: blur(4px);
			border: 1px solid rgba(255,255,255,0.1);
		}

		#speedometer {
			font-size: 36px;
			font-weight: bold;
			letter-spacing: 1px;
		}
		#speedometer .unit { font-size: 14px; font-weight: normal; opacity: 0.7; }

		#gear-display {
			font-size: 28px;
			font-weight: bold;
			min-width: 40px;
			text-align: center;
		}

		#rpm-bar-container {
			width: 120px;
			height: 8px;
			background: rgba(255,255,255,0.15);
			border-radius: 4px;
			overflow: hidden;
		}
		#rpm-bar {
			height: 100%;
			width: 0%;
			border-radius: 4px;
			transition: width 0.05s linear;
			background: linear-gradient(90deg, #4a4, #fa0, #f44);
		}

		#controls-help {
			position: fixed;
			top: 12px;
			right: 12px;
			background: rgba(0,0,0,0.5);
			color: rgba(255,255,255,0.6);
			padding: 8px 12px;
			border-radius: 6px;
			font-size: 11px;
			line-height: 1.6;
			pointer-events: none;
			z-index: 10;
		}

		#loading {
			position: fixed;
			inset: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #111;
			color: #888;
			font-size: 18px;
			z-index: 100;
		}
	</style>
</head>
<body>
	<div id="loading">Loading track...</div>
	<div id="hud" style="display:none">
		<div class="hud-panel">
			<div id="speedometer">0 <span class="unit">km/h</span></div>
			<div id="rpm-bar-container"><div id="rpm-bar"></div></div>
		</div>
		<div class="hud-panel" id="gear-display">N</div>
	</div>
	<div id="controls-help">
		W/S or ↑/↓ — Throttle/Brake<br>
		A/D or ←/→ — Steer<br>
		Space — Handbrake<br>
		R — Reset position
	</div>
	<script type="module" src="/src/client/practice.ts"></script>
</body>
</html>
