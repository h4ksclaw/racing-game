<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Racing — Practice</title>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: system-ui, sans-serif; }
		canvas { display: block; width: 100%; height: 100%; }
	</style>
</head>
<body>
	<system-bar seed="42" time="14:00" weather="clear" surface="dry"></system-bar>
	<car-nameplate number="86" name="AE86 TRUENO"></car-nameplate>
	<speed-display speed="0" gear="0" rpm="0"></speed-display>
	<tire-temps fl="0" fr="0" rl="0" rr="0"></tire-temps>
	<gear-strip gear="0"></gear-strip>
	<session-badge type="FREE ROAM" elapsed="0"></session-badge>
	<rpm-bar rpm="0"></rpm-bar>
	<steer-indicator input="0"></steer-indicator>
	<pedal-bars throttle="0" brake="0"></pedal-bars>
	<damage-bar health="100"></damage-bar>
	<speed-trap top-speed="0"></speed-trap>
	<race-toast message="" type="ok" visible></race-toast>
	<race-minimap player-x="0" player-z="0" heading="0" speed="0"></race-minimap>
	<controls-help world-url="/world" garage-url="/garage"></controls-help>
	<loading-screen message="Loading world..." visible></loading-screen>

	<script type="module">
		import "./src/client/ui/index.ts";
	</script>
	<script type="module" src="/src/client/practice.ts"></script>
</body>
</html>
