<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Racing Game — UI Concept</title>
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');

		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body { width: 100%; height: 100%; overflow: hidden; background: #06040a; }

		.canvas-bg { position: absolute; inset: 0; z-index: 0; }
		.canvas-bg canvas { display: block; width: 100%; height: 100%; }

		/* ── TOP BAR (HUD Terminal style) ─────────────────────── */
		.top-bar {
			position: fixed; top: 0; left: 0; right: 0; z-index: 100; pointer-events: none;
			font-family: 'JetBrains Mono', monospace;
			display: flex; align-items: center;
			background: rgba(6,4,14,0.8);
			backdrop-filter: blur(12px);
			border-bottom: 1px solid rgba(139,92,246,0.08);
			padding: 7px 20px;
		}
		.top-bar .label { font-size: 9px; color: rgba(139,92,246,0.35); letter-spacing: 3px; }
		.top-bar .value { font-size: 9px; color: rgba(255,255,255,0.45); margin-left: 6px; }
		.top-bar .sep { font-size: 9px; color: rgba(139,92,246,0.08); margin: 0 14px; }
		.top-bar .controls { margin-left: auto; font-size: 9px; color: rgba(139,92,246,0.18); letter-spacing: 1px; }

		/* Corner brackets from terminal */
		.corner-tl { position:fixed; top:32px; left:4px; width:14px; height:14px; border-left:2px solid rgba(139,92,246,0.12); border-top:2px solid rgba(139,92,246,0.12); pointer-events:none; z-index:90; }
		.corner-tr { position:fixed; top:32px; right:4px; width:14px; height:14px; border-right:2px solid rgba(139,92,246,0.12); border-top:2px solid rgba(139,92,246,0.12); pointer-events:none; z-index:90; }
		.corner-bl { position:fixed; bottom:68px; left:4px; width:14px; height:14px; border-left:2px solid rgba(139,92,246,0.12); border-bottom:2px solid rgba(139,92,246,0.12); pointer-events:none; z-index:90; }
		.corner-br { position:fixed; bottom:68px; right:4px; width:14px; height:14px; border-right:2px solid rgba(139,92,246,0.12); border-bottom:2px solid rgba(139,92,246,0.12); pointer-events:none; z-index:90; }

		/* ── BOTTOM HUD (Broadcast layout, Tokyo Drift theming) ── */
		.bottom-hud {
			position: fixed; bottom: 16px; left: 16px; right: 16px; z-index: 100; pointer-events: none;
			display: flex; align-items: flex-end; justify-content: space-between;
		}

		/* Left: nameplate + data row (broadcast style) */
		.hud-left { font-family: 'Inter', sans-serif; }

		.nameplate {
			display: flex; align-items: stretch;
		}
		.nameplate .num {
			background: rgba(139,92,246,0.85); padding: 5px 12px;
			display: flex; align-items: center;
		}
		.nameplate .num span {
			font-size: 15px; font-weight: 800; color: #fff; letter-spacing: 1px;
		}
		.nameplate .car {
			background: rgba(10,8,18,0.85); backdrop-filter: blur(10px);
			padding: 5px 14px; display: flex; align-items: center;
			border: 1px solid rgba(139,92,246,0.12); border-left: none;
		}
		.nameplate .car span {
			font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.75); letter-spacing: 0.5px;
		}

		.data-row {
			margin-top: 5px; background: rgba(10,8,18,0.8); backdrop-filter: blur(10px);
			border: 1px solid rgba(139,92,246,0.08);
			padding: 7px 14px; display: inline-flex; align-items: baseline; gap: 6px;
		}
		.data-row .speed-val {
			font-size: 30px; font-weight: 700; color: #fff;
			font-variant-numeric: tabular-nums; letter-spacing: -1px;
		}
		.data-row .speed-unit {
			font-size: 10px; color: rgba(139,92,246,0.4); font-weight: 500; letter-spacing: 1px;
		}
		.data-row .sep {
			margin: 0 6px; color: rgba(139,92,246,0.08);
		}
		.data-row .label {
			font-size: 9px; color: rgba(139,92,246,0.3); font-weight: 600; letter-spacing: 1px;
		}
		.data-row .val {
			font-size: 17px; font-weight: 700; color: rgba(139,92,246,0.8);
			font-variant-numeric: tabular-nums;
		}
		.data-row .val-white {
			font-size: 17px; font-weight: 700; color: rgba(255,255,255,0.65);
			font-variant-numeric: tabular-nums;
		}

		/* Right: session + RPM (broadcast clean + terminal segments) */
		.hud-right { font-family: 'Inter', sans-serif; text-align: right; }

		.session-badge {
			background: rgba(10,8,18,0.8); backdrop-filter: blur(10px);
			border: 1px solid rgba(139,92,246,0.08);
			padding: 6px 14px; display: inline-flex; align-items: center; gap: 8px;
		}
		.session-badge .dot {
			width: 5px; height: 5px; border-radius: 50%; background: #8b5cf6;
			animation: pulse 2s infinite;
		}
		.session-badge .timer {
			font-size: 13px; color: rgba(255,255,255,0.6); font-weight: 600;
			font-variant-numeric: tabular-nums; letter-spacing: 0.5px;
			font-family: 'JetBrains Mono', monospace;
		}
		.session-badge .type {
			font-size: 9px; color: rgba(139,92,246,0.35); font-weight: 600; letter-spacing: 1px;
		}

		/* Segmented RPM bar (terminal style) */
		.rpm-strip {
			margin-top: 5px; background: rgba(10,8,18,0.8); backdrop-filter: blur(10px);
			border: 1px solid rgba(139,92,246,0.08);
			padding: 7px 14px; display: flex; align-items: center; gap: 8px;
		}
		.rpm-strip .label {
			font-size: 9px; color: rgba(139,92,246,0.3); font-weight: 600; letter-spacing: 2px;
		}
		.rpm-strip .segments {
			display: flex; gap: 2px; flex: 1; height: 7px;
		}
		.rpm-strip .seg {
			flex: 1; background: rgba(139,92,246,0.06); transition: background 0.05s;
		}
		.rpm-strip .seg.red { background: rgba(244,63,94,0.06); }
		.rpm-strip .rpm-val {
			font-size: 10px; color: rgba(139,92,246,0.5); min-width: 28px; text-align: right;
			font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums;
		}

		/* ── NOTIFICATION (Tokyo Drift glow + terminal prefix) ── */
		.toast {
			position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
			z-index: 200; pointer-events: none;
			font-family: 'JetBrains Mono', monospace;
			background: rgba(10,8,18,0.85); backdrop-filter: blur(12px);
			border: 1px solid rgba(139,92,246,0.12);
			padding: 10px 22px;
			font-size: 10px; color: rgba(139,92,246,0.5); letter-spacing: 2px;
		}
		.toast .ok { color: rgba(163,230,53,0.6); margin-right: 8px; }

		/* ── Scanline overlay (Tokyo Drift) ───────────────────── */
		.scanlines {
			position: fixed; inset: 0; pointer-events: none; z-index: 50;
			background: repeating-linear-gradient(
				0deg, transparent, transparent 2px,
				rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px
			);
		}

		/* ── Thin RPM edge bar (broadcast) ────────────────────── */
		.rpm-edge {
			position: fixed; bottom: 0; left: 0; right: 0; height: 3px;
			z-index: 100; pointer-events: none;
		}
		.rpm-edge .track { height: 100%; background: rgba(255,255,255,0.02); }
		.rpm-edge .fill {
			height: 100%; transition: width 0.05s linear;
			background: linear-gradient(90deg, rgba(139,92,246,0.2), rgba(139,92,246,0.5), rgba(244,63,94,0.5));
		}

		/* ── Live indicator pulse ──────────────────────────────── */
		@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
	</style>
</head>
<body>

<div class="canvas-bg" id="bg"></div>

<!-- Scanlines -->
<div class="scanlines"></div>

<!-- Corner brackets -->
<div class="corner-tl"></div>
<div class="corner-tr"></div>
<div class="corner-bl"></div>
<div class="corner-br"></div>

<!-- ── TOP BAR (Terminal: labeled system data) ─────────────── -->
<div class="top-bar">
	<span class="label">SEED</span><span class="value">0042</span>
	<span class="sep">|</span>
	<span class="label">TIME</span><span class="value">18:30</span>
	<span class="sep">|</span>
	<span class="label">WX</span><span class="value">CLEAR</span>
	<span class="sep">|</span>
	<span class="label">SURFACE</span><span class="value">DRY</span>
	<span class="sep">|</span>
	<span class="label">POS</span><span class="value" id="pos">142.3 / 88.1 / 12.0</span>
	<span class="controls">W/S A/D SPACE R</span>
</div>

<!-- ── BOTTOM HUD ──────────────────────────────────────────── -->
<div class="bottom-hud">

	<!-- Left: broadcast nameplate + inline data -->
	<div class="hud-left">
		<div class="nameplate">
			<div class="num"><span>86</span></div>
			<div class="car"><span>AE86 TRUENO</span></div>
		</div>
		<div class="data-row">
			<span class="speed-val" id="speed">142</span>
			<span class="speed-unit">km/h</span>
			<span class="sep">|</span>
			<span class="label">GEAR</span>
			<span class="val" id="gear">4</span>
			<span class="sep">|</span>
			<span class="label">RPM</span>
			<span class="val-white" id="rpm">7200</span>
		</div>
	</div>

	<!-- Right: session timer + segmented RPM -->
	<div class="hud-right">
		<div class="session-badge">
			<div class="dot"></div>
			<span class="type">FREE ROAM</span>
			<span class="timer">00:00:00</span>
		</div>
		<div class="rpm-strip">
			<span class="label">RPM</span>
			<div class="segments">
				<div class="seg" id="s1"></div>
				<div class="seg" id="s2"></div>
				<div class="seg" id="s3"></div>
				<div class="seg" id="s4"></div>
				<div class="seg" id="s5"></div>
				<div class="seg" id="s6"></div>
				<div class="seg red" id="s7"></div>
				<div class="seg red" id="s8"></div>
			</div>
			<span class="rpm-val" id="rpm-val">7200</span>
		</div>
	</div>

</div>

<!-- RPM edge bar -->
<div class="rpm-edge">
	<div class="track"><div class="fill" id="rpm-edge-fill" style="width:72%"></div></div>
</div>

<!-- Toast notification -->
<div class="toast"><span class="ok">[OK]</span> WORLD LOADED</div>

<script type="module">
import * as THREE from "three";

const container = document.getElementById("bg");
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x06040a);
scene.fog = new THREE.FogExp2(0x06040a, 0.004);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 60, 140);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
container.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0x88bbff, 0x445511, 0.3));
const dir = new THREE.DirectionalLight(0xffffcc, 0.8);
dir.position.set(100, 150, 50);
scene.add(dir);

const accent = new THREE.PointLight(new THREE.Color(0x8b5cf6), 2, 300);
accent.position.set(0, 30, 0);
scene.add(accent);

const ground = new THREE.Mesh(
	new THREE.PlaneGeometry(2000, 2000),
	new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -20;
scene.add(ground);

const geo = new THREE.TorusKnotGeometry(15, 4, 128, 32);
const mat = new THREE.MeshStandardMaterial({
	color: 0x8b5cf6, metalness: 0.6, roughness: 0.3,
	emissive: 0x8b5cf6, emissiveIntensity: 0.1
});
const mesh = new THREE.Mesh(geo, mat);
scene.add(mesh);

let t = 0;

function animate() {
	requestAnimationFrame(animate);
	t += 0.016;

	mesh.rotation.x += 0.002;
	mesh.rotation.y += 0.004;
	accent.intensity = 2 + Math.sin(t * 2) * 0.5;
	renderer.render(scene, camera);

	// Animate values
	const speed = 60 + Math.sin(t * 0.5) * 80 + Math.sin(t * 1.3) * 20;
	const rpm = 0.3 + Math.abs(Math.sin(t * 0.8)) * 0.65;
	const gear = Math.min(Math.floor(Math.max(0, speed) / 40), 4) + 1;
	const rpmVal = Math.round(rpm * 8000);

	const $ = (id) => document.getElementById(id);
	if ($("speed")) $("speed").textContent = Math.max(0, Math.round(speed));
	if ($("gear")) $("gear").textContent = gear;
	if ($("rpm")) $("rpm").textContent = rpmVal;
	if ($("rpm-val")) $("rpm-val").textContent = rpmVal;
	if ($("rpm-edge-fill")) $("rpm-edge-fill").style.width = `${rpm * 100}%`;

	// Segmented RPM — 8 segments, last 2 are red zone
	for (let i = 1; i <= 8; i++) {
		const seg = $(`s${i}`);
		if (!seg) continue;
		const filled = (rpm * 8) >= i;
		const isRed = i >= 7;
		if (filled) {
			seg.style.background = isRed ? "rgba(244,63,94,0.6)" : "rgba(139,92,246,0.5)";
		} else {
			seg.style.background = isRed ? "rgba(244,63,94,0.06)" : "rgba(139,92,246,0.06)";
		}
	}
}

animate();

window.addEventListener("resize", () => {
	camera.aspect = window.innerWidth / window.innerHeight;
	camera.updateProjectionMatrix();
	renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
