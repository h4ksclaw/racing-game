<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Racing Game — UI Concept</title>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body { width: 100%; height: 100%; overflow: hidden; background: #06040a; }

		.canvas-bg { position: absolute; inset: 0; z-index: 0; }
		.canvas-bg canvas { display: block; width: 100%; height: 100%; }

		/* ── Viewport corners ────────────────────────────────────── */
		.corner { position:fixed; width:14px; height:14px; pointer-events:none; z-index:90; }
		.c-tl { top:32px; left:4px; border-left:2px solid rgba(139,92,246,0.12); border-top:2px solid rgba(139,92,246,0.12); }
		.c-tr { top:32px; right:4px; border-right:2px solid rgba(139,92,246,0.12); border-top:2px solid rgba(139,92,246,0.12); }
		.c-bl { bottom:4px; left:4px; border-left:2px solid rgba(139,92,246,0.12); border-bottom:2px solid rgba(139,92,246,0.12); }
		.c-br { bottom:4px; right:4px; border-right:2px solid rgba(139,92,246,0.12); border-bottom:2px solid rgba(139,92,246,0.12); }

		/* ── RPM EDGE BAR ─────────────────────────────────────── */
		.rpm-edge {
			position: fixed; bottom: 0; left: 0; right: 0; height: 3px;
			z-index: 100; pointer-events: none;
		}
		.rpm-edge .track { height: 100%; background: rgba(255,255,255,0.02); }
		.rpm-edge .fill { height: 100%; transition: width 0.05s linear; background: linear-gradient(90deg, rgba(139,92,246,0.2), rgba(139,92,246,0.5), rgba(244,63,94,0.5)); }

		/* ── SCANLINES ────────────────────────────────────────── */
		.scanlines {
			position: fixed; inset: 0; pointer-events: none; z-index: 50;
			background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px);
		}
	</style>
</head>
<body>

<div class="canvas-bg" id="bg"></div>
<div class="scanlines"></div>

<!-- Viewport corners -->
<div class="corner c-tl"></div>
<div class="corner c-tr"></div>
<div class="corner c-bl"></div>
<div class="corner c-br"></div>

<!-- ── Lit UI Components ─────────────────────────────────────────── -->
<system-bar seed="42" time="18:30" weather="clear" surface="dry" pos-x="142.3" pos-z="88.1" pos-y="12.0"></system-bar>
<lap-timer lap="3/5" time="1:42.307" best="1:41.892" delta="+0.415"></lap-timer>
<tire-temps fl="82" fr="84" rl="91" rr="89"></tire-temps>
<race-minimap player-x="142" player-z="88" heading="0" speed="142"></race-minimap>
<gear-strip gear="4"></gear-strip>
<pedal-bars throttle="0" brake="0"></pedal-bars>
<steer-indicator input="0"></steer-indicator>
<car-nameplate number="86" name="AE86 TRUENO"></car-nameplate>
<speed-display speed="142" gear="4" rpm="0.72"></speed-display>
<damage-bar health="100"></damage-bar>
<session-badge type="FREE ROAM" elapsed="0"></session-badge>
<rpm-bar rpm="0.72"></rpm-bar>
<speed-trap top-speed="187"></speed-trap>
<race-toast message="WORLD LOADED" type="ok" visible></race-toast>

<!-- RPM edge bar -->
<div class="rpm-edge">
	<div class="track"><div class="fill" id="rpm-edge-fill" style="width:72%"></div></div>
</div>

<script type="module">
import "./src/client/ui/index.ts";

// ── Three.js background ──────────────────────────────────────
const THREE = await import("three");
const container = document.getElementById("bg");
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x06040a);
scene.fog = new THREE.FogExp2(0x06040a, 0.004);
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 60, 140);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
container.appendChild(renderer.domElement);
scene.add(new THREE.HemisphereLight(0x88bbff, 0x445511, 0.3));
const dir = new THREE.DirectionalLight(0xffffcc, 0.8);
dir.position.set(100, 150, 50);
scene.add(dir);
const accent = new THREE.PointLight(new THREE.Color(0x8b5cf6), 2, 300);
accent.position.set(0, 30, 0);
scene.add(accent);
const ground = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 }));
ground.rotation.x = -Math.PI / 2; ground.position.y = -20; scene.add(ground);
const mesh = new THREE.Mesh(new THREE.TorusKnotGeometry(15, 4, 128, 32), new THREE.MeshStandardMaterial({ color: 0x8b5cf6, metalness: 0.6, roughness: 0.3, emissive: 0x8b5cf6, emissiveIntensity: 0.1 }));
scene.add(mesh);

// ── Component refs ───────────────────────────────────────────
const $ = (sel) => document.querySelector(sel);
const speedDisplay = $("speed-display");
const rpmBar = $("rpm-bar");
const gearStrip = $("gear-strip");
const steerInd = $("steer-indicator");
const pedalBars = $("pedal-bars");
const tireTemps = $("tire-temps");
const damageBar = $("damage-bar");
const sessionBadge = $("session-badge");
const speedTrap = $("speed-trap");
const minimap = $("race-minimap");
const systemBar = $("system-bar");
const lapTimer = $("lap-timer");
const rpmEdgeFill = document.getElementById("rpm-edge-fill");

let t = 0;
let topSpeed = 187;
let sessionStart = Date.now();

function animate() {
	requestAnimationFrame(animate);
	t += 0.016;

	mesh.rotation.x += 0.002;
	mesh.rotation.y += 0.004;
	accent.intensity = 2 + Math.sin(t * 2) * 0.5;
	renderer.render(scene, camera);

	// ── Simulated values ──
	const speed = 60 + Math.sin(t * 0.5) * 80 + Math.sin(t * 1.3) * 20;
	const absSpeed = Math.max(0, Math.round(speed));
	const rpm = 0.3 + Math.abs(Math.sin(t * 0.8)) * 0.65;
	const gear = Math.min(Math.floor(Math.max(0, speed) / 40), 4) + 1;
	const steer = Math.sin(t * 0.3) * 0.8;
	const throttle = Math.max(0, Math.sin(t * 0.25));
	const brake = Math.max(0, -Math.sin(t * 0.7) * 0.4);
	const heading = t * 0.2;

	if (absSpeed > topSpeed) topSpeed = absSpeed;

	// ── Update Lit components ──
	if (speedDisplay) {
		speedDisplay.speed = absSpeed;
		speedDisplay.gear = gear;
		speedDisplay.rpm = rpm;
	}
	if (rpmBar) rpmBar.rpm = rpm;
	if (gearStrip) gearStrip.gear = gear;
	if (steerInd) steerInd.input = steer;
	if (pedalBars) {
		pedalBars.throttle = throttle;
		pedalBars.brake = brake;
	}

	// Tire temps
	const flTemp = 78 + Math.round(Math.sin(t * 0.1) * 8 + speed * 0.03);
	const frTemp = 80 + Math.round(Math.sin(t * 0.12 + 1) * 6 + speed * 0.04);
	const rlTemp = 85 + Math.round(Math.sin(t * 0.08 + 2) * 10 + speed * 0.05);
	const rrTemp = 83 + Math.round(Math.sin(t * 0.09 + 3) * 7 + speed * 0.04);
	if (tireTemps) {
		tireTemps.fl = flTemp;
		tireTemps.fr = frTemp;
		tireTemps.rl = rlTemp;
		tireTemps.rr = rrTemp;
	}

	// Damage
	const dmg = Math.max(0, 100 - t * 0.5 + Math.sin(t * 0.2) * 5);
	if (damageBar) damageBar.health = dmg;

	// Session timer
	const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
	if (sessionBadge) sessionBadge.elapsed = elapsed;

	// Top speed
	if (speedTrap) speedTrap.topSpeed = topSpeed;

	// Minimap
	const posX = 142.3 + Math.sin(t * 0.2) * 20;
	const posZ = 88.1 + Math.cos(t * 0.15) * 15;
	if (minimap) {
		minimap.playerX = posX;
		minimap.playerZ = posZ;
		minimap.heading = heading;
		minimap.speed = absSpeed;
	}

	// System bar position
	if (systemBar) {
		systemBar.posX = posX;
		systemBar.posZ = posZ;
	}

	// Lap delta
	const delta = (Math.sin(t * 0.15) * 2).toFixed(3);
	if (lapTimer) lapTimer.delta = delta;

	// RPM edge bar
	if (rpmEdgeFill) rpmEdgeFill.style.width = `${rpm * 100}%`;
}

animate();

window.addEventListener("resize", () => {
	camera.aspect = window.innerWidth / window.innerHeight;
	camera.updateProjectionMatrix();
	renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
