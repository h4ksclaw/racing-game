<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Track Generator</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
		canvas { display: block; width: 100%; height: 100%; }
		#controls {
			position: absolute; top: 10px; left: 10px; z-index: 10;
			background: rgba(0,0,0,0.75); color: #eee; padding: 14px 18px;
			border-radius: 8px; font: 13px/1.6 system-ui, sans-serif;
		}
		#controls h2 { font-size: 15px; margin-bottom: 8px; color: #8f8; }
		#controls label { display: block; margin-top: 6px; }
		#controls input[type=number] { width: 70px; padding: 2px 4px; background: #222; color: #eee; border: 1px solid #555; border-radius: 3px; }
		#controls button {
			margin-top: 10px; padding: 6px 16px; cursor: pointer;
			background: #3a3; color: #fff; border: none; border-radius: 4px;
			font: 13px system-ui;
		}
		#controls button:hover { background: #4b4; }
		#controls button.secondary { background: #555; }
		#controls button.secondary:hover { background: #666; }
		#info {
			position: absolute; bottom: 10px; left: 10px; z-index: 10;
			background: rgba(0,0,0,0.75); color: #aaa; padding: 8px 12px;
			border-radius: 6px; font: 12px/1.5 monospace;
		}
	</style>
</head>
<body>
	<div id="controls">
		<h2>Track Generator</h2>
		<label style="opacity:0.6;font-size:11px">Seed: <span id="seedDisplay">42</span></label>
		<br />
		<button id="generateBtn">New Track</button>
		<button id="flyoverBtn" class="secondary" style="margin-top:6px">▶ Preview Track</button>
		<label style="margin-top:8px">Flyover Speed:
			<input type="range" id="flyoverSpeed" min="80" max="500" step="10" value="120" style="width:100%;margin-top:4px" />
			<span id="flyoverSpeedLabel" style="float:right">120 km/h</span>
		</label>
		<label style="margin-top:12px">Time of Day:
			<input type="range" id="timeSlider" min="0" max="24" step="0.1" value="12" style="width:100%;margin-top:4px" />
			<span id="timeLabel" style="float:right">12:00</span>
		</label>
		<label style="margin-top:8px">Weather:
			<select id="weatherSelect" style="width:100%;margin-top:4px;padding:3px 6px;background:#222;color:#eee;border:1px solid #555;border-radius:3px">
				<option value="clear">Clear</option>
				<option value="cloudy">Cloudy</option>
				<option value="rain">Rain</option>
				<option value="heavy_rain">Heavy Rain</option>
				<option value="fog">Fog</option>
				<option value="snow">Snow</option>
			</select>
		</label>
	</div>
	<div id="info">Loading…</div>
	<script type="module" src="/src/client/track.ts"></script>
</body>
</html>
