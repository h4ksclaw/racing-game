<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Track Generator Debug</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; font-family: 'Courier New', monospace; color: #eee; }
canvas { display: block; }

#ui {
  position: absolute; top: 12px; left: 12px; z-index: 10;
  background: rgba(0,0,0,0.75); padding: 14px 18px; border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(8px);
  min-width: 260px;
}
#ui h1 { font-size: 14px; margin-bottom: 10px; color: #8be9fd; text-transform: uppercase; letter-spacing: 2px; }
.row { display: flex; align-items: center; justify-content: space-between; margin: 6px 0; font-size: 12px; }
.row label { color: #aaa; }
.row input[type=number] { width: 70px; background: #333; border: 1px solid #555; color: #fff; padding: 3px 6px; border-radius: 4px; font-family: inherit; font-size: 12px; }
.row input[type=range] { width: 100px; accent-color: #8be9fd; }
.row span.val { color: #8be9fd; min-width: 30px; text-align: right; }
button {
  margin-top: 10px; padding: 6px 14px; background: #8be9fd; color: #1a1a2e;
  border: none; border-radius: 4px; font-family: inherit; font-weight: bold;
  font-size: 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
  width: 100%;
}
button:hover { background: #a4e8ff; }
#info {
  position: absolute; bottom: 12px; left: 12px; z-index: 10;
  background: rgba(0,0,0,0.75); padding: 10px 14px; border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1); font-size: 11px; color: #aaa;
  backdrop-filter: blur(8px);
}
#info .stat { margin: 2px 0; }
#info .stat span { color: #8be9fd; }
#controls-hint {
  position: absolute; bottom: 12px; right: 12px; z-index: 10;
  background: rgba(0,0,0,0.75); padding: 10px 14px; border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1); font-size: 11px; color: #666;
  backdrop-filter: blur(8px);
}
</style>
  <script src="assets/track.js"></script>
</head>
<body>

<div id="ui">
  <h1>🏁 Track Generator</h1>
  <div class="row"><label>Seed</label><input type="number" id="seed" value="42" min="0" max="99999"></div>
  <div class="row"><label>Control Points</label><input type="number" id="numPoints" value="14" min="6" max="24"></div>
  <div class="row"><label>Track Width</label><span class="val" id="widthVal">12</span><input type="range" id="trackWidth" min="8" max="18" value="12" step="1"></div>
  <div class="row"><label>Elevation</label><span class="val" id="elevVal">40</span><input type="range" id="elevation" min="0" max="80" value="40" step="5"></div>
  <div class="row"><label>Tightness</label><span class="val" id="tightVal">5</span><input type="range" id="tightness" min="1" max="10" value="5" step="1"></div>
  <div class="row"><label>Downhill Bias</label><span class="val" id="downhillVal">60</span><input type="range" id="downhillBias" min="0" max="100" value="60" step="5"></div>
  <button id="generate">⟳ Generate</button>
  <button id="random" style="background:#bd93f9; margin-top:4px;">🎲 Random Seed</button>
</div>

<div id="info"></div>

<div id="controls-hint">
  <b style="color:#8be9fd">🖱️ Controls:</b><br>
  <b>Left drag</b> — rotate view<br>
  <b>Right drag</b> — pan<br>
  <b>Scroll</b> — zoom in/out<br>
  <b>Middle click</b> — reset view<br><br>
  <span style="color:#666">Try scrolling to zoom in!</span>
</div>

</body>
</html>
