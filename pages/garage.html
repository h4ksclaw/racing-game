<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Garage</title>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body { width: 100%; height: 100%; overflow: hidden; background: #11131c; font-family: 'Inter', system-ui, sans-serif; color: #fff; }

		#viewer-canvas {
			position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
		}

		/* Top bar */
		#top-bar {
			position: fixed; top: 0; left: 0; right: 0; z-index: 10;
			height: 44px; display: flex; align-items: center; justify-content: space-between;
			padding: 0 16px;
			background: linear-gradient(180deg, rgba(17,19,28,0.92) 0%, rgba(17,19,28,0) 100%);
			pointer-events: none;
		}
		#top-bar > * { pointer-events: auto; }
		#top-bar h1 {
			font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600;
			letter-spacing: 2px; text-transform: uppercase; color: rgba(92,158,255,0.9);
		}
		#top-bar nav a {
			color: rgba(255,255,255,0.5); text-decoration: none; font-size: 12px;
			font-family: 'JetBrains Mono', monospace; margin-left: 16px;
			transition: color 0.15s;
		}
		#top-bar nav a:hover { color: #fff; }

		/* Sidebar */
		#sidebar {
			position: fixed; top: 52px; left: 12px; bottom: 60px; width: 300px; z-index: 10;
			background: rgba(17,19,28,0.92); backdrop-filter: blur(12px);
			border: 1px solid rgba(92,158,255,0.12); border-radius: 6px;
			overflow-y: auto; overflow-x: hidden;
			padding: 8px 0;
		}
		#sidebar::-webkit-scrollbar { width: 5px; }
		#sidebar::-webkit-scrollbar-track { background: transparent; }
		#sidebar::-webkit-scrollbar-thumb { background: rgba(92,158,255,0.3); border-radius: 3px; }

		/* Sections */
		.garage-section { border-bottom: 1px solid rgba(92,158,255,0.08); }
		.garage-section:last-child { border-bottom: none; }
		.section-header {
			display: flex; align-items: center; justify-content: space-between;
			padding: 10px 14px; cursor: pointer; user-select: none;
			transition: background 0.12s;
		}
		.section-header:hover { background: rgba(92,158,255,0.06); }
		.section-title {
			font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
			color: #fff; letter-spacing: 0.5px;
		}
		.section-chevron {
			font-size: 10px; color: rgba(92,158,255,0.6);
			transition: transform 0.2s;
		}
		.section-chevron.collapsed { transform: rotate(-90deg); }
		.section-body { padding: 4px 14px 12px; }
		.section-body.collapsed { display: none; }

		/* Tuning field */
		.field-row {
			margin-bottom: 12px;
		}
		.field-header {
			display: flex; align-items: center; justify-content: space-between;
			margin-bottom: 6px;
		}
		.field-label {
			font-family: 'JetBrains Mono', monospace; font-size: 9px;
			color: rgba(92,158,255,0.65); text-transform: uppercase;
			letter-spacing: 1px; flex-shrink: 0;
		}
		.field-value {
			font-family: 'JetBrains Mono', monospace; font-size: 11px;
			color: rgba(255,255,255,0.85); cursor: pointer;
			padding: 1px 4px; border-radius: 2px;
			transition: background 0.12s, color 0.12s;
		}
		.field-value:hover {
			background: rgba(92,158,255,0.15); color: #fff;
		}
		.field-value-input {
			width: 64px; padding: 1px 4px; text-align: right;
			background: rgba(17,19,28,0.9); border: 1px solid rgba(92,158,255,0.4);
			border-radius: 2px; color: #fff;
			font-family: 'JetBrains Mono', monospace; font-size: 11px;
			outline: none;
		}
		.field-range-row {
			position: relative;
		}
		.tune-slider {
			-webkit-appearance: none;
			appearance: none;
			width: 100%;
			height: 3px;
			background: rgba(92,158,255,0.08);
			border-radius: 2px;
			outline: none;
			cursor: pointer;
			display: block;
		}
		.tune-slider::-webkit-slider-thumb {
			-webkit-appearance: none;
			width: 14px;
			height: 14px;
			border-radius: 50%;
			background: rgba(92,158,255,0.8);
			border: 2px solid rgba(92,158,255,0.4);
			box-shadow: 0 0 8px rgba(92,158,255,0.3);
			cursor: grab;
			transition: box-shadow 0.15s;
		}
		.tune-slider::-webkit-slider-thumb:hover {
			box-shadow: 0 0 14px rgba(92,158,255,0.5);
		}
		.tune-slider::-webkit-slider-thumb:active {
			cursor: grabbing;
			box-shadow: 0 0 20px rgba(92,158,255,0.6);
		}
		.tune-slider::-moz-range-thumb {
			width: 14px;
			height: 14px;
			border-radius: 50%;
			background: rgba(92,158,255,0.8);
			border: 2px solid rgba(92,158,255,0.4);
			box-shadow: 0 0 8px rgba(92,158,255,0.3);
			cursor: grab;
		}
		.tune-slider::-moz-range-track {
			height: 3px;
			background: rgba(92,158,255,0.08);
			border-radius: 2px;
			border: none;
		}
		.field-range-labels {
			display: flex; justify-content: space-between;
			font-family: 'JetBrains Mono', monospace; font-size: 8px;
			color: rgba(92,158,255,0.3); margin-top: 2px;
			padding: 0 2px;
		}

		/* Gear ratio bar chart */
		.gear-chart {
			display: flex; align-items: flex-end; gap: 6px;
			height: 60px; padding: 4px 0 0;
		}
		.gear-bar-col {
			flex: 1; display: flex; flex-direction: column; align-items: center;
			height: 100%; justify-content: flex-end;
		}
		.gear-bar {
			width: 100%; max-width: 28px; border-radius: 2px 2px 0 0;
			background: rgba(92,158,255,0.35);
			cursor: pointer;
			transition: background 0.12s, box-shadow 0.12s;
			min-height: 4px;
		}
		.gear-bar:hover { background: rgba(92,158,255,0.55); }
		.gear-bar.selected {
			background: rgba(92,158,255,0.8);
			box-shadow: 0 0 8px rgba(92,158,255,0.4);
		}
		.gear-bar-label {
			font-family: 'JetBrains Mono', monospace; font-size: 8px;
			color: rgba(255,255,255,0.5); margin-top: 3px;
		}
		.gear-edit-slider {
			margin-top: 8px; padding-top: 8px;
			border-top: 1px solid rgba(92,158,255,0.08);
		}
		.gear-edit-label {
			font-family: 'JetBrains Mono', monospace; font-size: 9px;
			color: rgba(92,158,255,0.7); margin-bottom: 4px;
		}

		/* Torque curve canvas */
		#torque-curve-canvas {
			width: 100%; height: 80px; border-radius: 4px;
			background: rgba(17,19,28,0.9); border: 1px solid rgba(92,158,255,0.1);
			margin-top: 4px;
		}

		/* Reset button */
		.reset-btn {
			display: block; width: calc(100% - 4px); margin: 8px 2px 4px;
			padding: 6px; border: 1px solid rgba(92,158,255,0.15);
			border-radius: 3px; background: rgba(92,158,255,0.06);
			color: rgba(255,255,255,0.5); font-family: 'JetBrains Mono', monospace;
			font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
			cursor: pointer; transition: all 0.15s;
		}
		.reset-btn:hover { background: rgba(92,158,255,0.12); color: #fff; }

		/* Bottom action bar */
		#action-bar {
			position: fixed; bottom: 12px; left: 12px; right: 12px; z-index: 10;
			display: flex; gap: 10px; justify-content: center;
			pointer-events: none;
		}
		#action-bar > * { pointer-events: auto; }
		.action-btn {
			padding: 10px 28px; border: none; border-radius: 4px;
			font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
			cursor: pointer; transition: all 0.15s; letter-spacing: 0.3px;
		}
		.btn-primary {
			background: rgba(92,158,255,0.8); color: #fff;
		}
		.btn-primary:hover { background: rgba(92,158,255,1); }
		.btn-secondary {
			background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7);
			border: 1px solid rgba(92,158,255,0.15);
		}
		.btn-secondary:hover { background: rgba(255,255,255,0.1); color: #fff; }
	</style>
</head>
<body>
	<canvas id="viewer-canvas"></canvas>

	<div id="top-bar">
		<h1>Garage</h1>
		<nav>
			<a id="nav-practice" href="/practice">Drive</a>
			<a id="nav-world" href="/world">Back to World</a>
		</nav>
	</div>

	<div id="sidebar"></div>

	<div id="action-bar">
		<button class="action-btn btn-secondary" id="btn-back">Back to World</button>
		<button class="action-btn btn-primary" id="btn-drive">Drive This Car</button>
	</div>

	<script type="module">
		import "/src/client/ui/index.ts";
	</script>
	<script type="module" src="/src/client/garage.ts"></script>
</body>
</html>
