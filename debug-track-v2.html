<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Track Debug — Procedural Track Generator</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
		canvas { display: block; width: 100%; height: 100%; }

		#controls {
			position: absolute; top: 10px; left: 10px; z-index: 10;
			background: rgba(0,0,0,0.75); color: #eee; padding: 14px 18px;
			border-radius: 8px; font: 13px/1.6 system-ui, sans-serif;
			max-width: 300px;
		}
		#controls h2 { font-size: 15px; margin-bottom: 8px; color: #8f8; }
		#controls label { display: block; margin-top: 6px; }
		#controls input[type=number] { width: 70px; padding: 2px 4px; background: #222; color: #eee; border: 1px solid #555; border-radius: 3px; }
		#controls button {
			margin-top: 10px; padding: 6px 16px; cursor: pointer;
			background: #3a3; color: #fff; border: none; border-radius: 4px;
			font: 13px system-ui;
		}
		#controls button:hover { background: #4b4; }
		#controls button.secondary { background: #555; }
		#controls button.secondary:hover { background: #666; }
		#info {
			position: absolute; bottom: 10px; left: 10px; z-index: 10;
			background: rgba(0,0,0,0.75); color: #aaa; padding: 8px 12px;
			border-radius: 6px; font: 12px/1.5 monospace;
		}
	</style>
</head>
<body>
	<div id="controls">
		<h2>🏎️ Track Generator</h2>
		<label>Seed: <input type="number" id="seed" value="42" /></label>
		<label>Points: <input type="number" id="numPoints" value="14" min="6" max="30" /></label>
		<label>Width: <input type="number" id="width" value="12" min="6" max="30" /></label>
		<label>Elevation: <input type="number" id="elevation" value="40" min="0" max="100" /></label>
		<label>Tightness: <input type="number" id="tightness" value="5" min="1" max="10" /></label>
		<label>Downhill: <input type="number" id="downhill" value="60" min="0" max="100" /></label>
		<br />
		<button id="generateBtn">Generate</button>
		<button id="randomBtn" class="secondary">Random Seed</button>
	</div>
	<div id="info">Loading…</div>

	<script type="module" src="/src/client/track/debug-main.ts"></script>
</body>
</html>
