<!DOCTYPE html>
<html>
<head>
  <title>Ground Collision Test</title>
  <style>
    body { margin: 0; background: #1a1a2e; color: #eee; font-family: monospace; overflow: hidden; }
    #hud { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 12px; border-radius: 8px; font-size: 14px; line-height: 1.6; z-index: 10; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="hud">
    <div>Y: <span id="y">0</span></div>
    <div>Speed: <span id="speed">0</span> km/h</div>
    <div>Contacts: <span id="contacts">0</span>/4</div>
    <div>GroundY: <span id="groundY">0</span></div>
    <div style="margin-top:8px">WASD=drive Space=brake R=reset</div>
  </div>
  <script type="module">
    import RAPIER from '@dimforge/rapier3d-compat';
    await RAPIER.init();

    // Simulate the game's terrain: raised road strip, lower surroundings
    const ROAD_Y = 5.0;
    const GRASS_Y = 2.0;
    const GROUND_SIZE = 100;

    function getHeight(x, z) {
      // On the road (|z| < 10): raised
      // Off road: lower with smooth blend
      const distFromRoad = Math.max(0, Math.abs(z) - 10);
      const blend = Math.min(1, distFromRoad / 5);
      return ROAD_Y + (GRASS_Y - ROAD_Y) * blend;
    }

    // ── Physics world ──
    const world = new RAPIER.World({ x: 0, y: -9.81, z: 0 });

    // Flat cuboid ground (same approach as game)
    let groundBody = null;
    let lastGX = Infinity, lastGZ = Infinity;

    function rebuildGround(cx, cz) {
      if (groundBody) world.removeRigidBody(groundBody);
      const h = getHeight(cx, cz);
      const half = GROUND_SIZE / 2;
      groundBody = world.createRigidBody(
        RAPIER.RigidBodyDesc.fixed().setTranslation(cx, h - 0.5, cz)
      );
      world.createCollider(
        RAPIER.ColliderDesc.cuboid(half, 0.5, half).setFriction(0.8),
        groundBody
      );
      lastGX = cx;
      lastGZ = cz;
      document.getElementById('groundY').textContent = h.toFixed(2);
    }

    // ── Car ──
    const mass = 1000;
    const halfW = 0.82, halfH = 0.67, halfD = 2.11;
    const wheelRadius = 0.31;
    const susRest = 0.2;
    const spawnH = getHeight(0, 0);

    const carBody = world.createRigidBody(
      RAPIER.RigidBodyDesc.dynamic()
        .setTranslation(0, spawnH + wheelRadius + susRest + halfH * 0.5, 0)
        .setLinearDamping(0.05)
        .setAngularDamping(0.8)
    );
    world.createCollider(
      RAPIER.ColliderDesc.cuboid(halfW, halfH, halfD)
        .setDensity(mass / (halfW * 2 * halfH * 2 * halfD * 2))
        .setFriction(0.0).setRestitution(0.1),
      carBody
    );

    // Low ballast for stable COM
    world.createCollider(
      RAPIER.ColliderDesc.cuboid(halfW * 0.7, 0.1, halfD * 0.7)
        .setDensity((mass * 0.5) / (halfW * 1.4 * 0.2 * halfD * 1.4))
        .setTranslation(0, -halfH - 0.05, 0).setFriction(0.0),
      carBody
    );

    const vehicle = world.createVehicleController(carBody);
    const wl = halfW * 0.85;
    const wy = -halfH * 0.5;
    for (const wo of [
      { x: -wl, z: halfD * 0.7 }, { x: wl, z: halfD * 0.7 },
      { x: -wl, z: -halfD * 0.7 }, { x: wl, z: -halfD * 0.7 }
    ]) {
      vehicle.addWheel(
        { x: wo.x, y: wy, z: wo.z },
        { x: 0, y: -1, z: 0 },
        { x: -1, y: 0, z: 0 },
        susRest, wheelRadius
      );
    }
    for (let i = 0; i < 4; i++) {
      vehicle.setWheelSuspensionStiffness(i, 30);
      vehicle.setWheelSuspensionCompression(i, 4.4);
      vehicle.setWheelSuspensionRelaxation(i, 2.3);
      vehicle.setWheelMaxSuspensionTravel(i, 0.3);
      vehicle.setWheelMaxSuspensionForce(i, 100000);
      vehicle.setWheelFrictionSlip(i, 3.0);
      vehicle.setWheelSideFrictionStiffness(i, 4.0);
    }

    rebuildGround(0, 0);

    // ── Input ──
    const input = { forward: false, backward: false, left: false, right: false, handbrake: false };
    let steerAngle = 0;
    window.addEventListener('keydown', e => {
      if (e.code === 'KeyW' || e.code === 'ArrowUp') input.forward = true;
      if (e.code === 'KeyS' || e.code === 'ArrowDown') input.backward = true;
      if (e.code === 'KeyA' || e.code === 'ArrowLeft') input.left = true;
      if (e.code === 'KeyD' || e.code === 'ArrowRight') input.right = true;
      if (e.code === 'Space') { input.handbrake = true; e.preventDefault(); }
      if (e.code === 'KeyR') {
        const h = getHeight(0, 0);
        carBody.setTranslation({ x: 0, y: h + wheelRadius + susRest + halfH * 0.5, z: 0 }, true);
        carBody.setLinvel({ x: 0, y: 0, z: 0 }, true);
        carBody.setAngvel({ x: 0, y: 0, z: 0 }, true);
        steerAngle = 0;
      }
    });
    window.addEventListener('keyup', e => {
      if (e.code === 'KeyW' || e.code === 'ArrowUp') input.forward = false;
      if (e.code === 'KeyS' || e.code === 'ArrowDown') input.backward = false;
      if (e.code === 'KeyA' || e.code === 'ArrowLeft') input.left = false;
      if (e.code === 'KeyD' || e.code === 'ArrowRight') input.right = false;
      if (e.code === 'Space') input.handbrake = false;
    });

    // ── HUD ──
    const yEl = document.getElementById('y');
    const speedEl = document.getElementById('speed');
    const contactsEl = document.getElementById('contacts');

    // ── Main loop ──
    let lastTime = performance.now();
    let frameCount = 0;

    function animate() {
      requestAnimationFrame(animate);
      const now = performance.now();
      const dt = Math.min((now - lastTime) / 1000, 1 / 30);
      lastTime = now;

      // Steering
      const vel = carBody.linvel();
      const speedKmh = Math.sqrt(vel.x ** 2 + vel.z ** 2) * 3.6;
      const speedRed = Math.max(0.15, 1 - (speedKmh / 140) ** 1.5);
      const targetSteer = ((input.left ? 1 : 0) - (input.right ? 1 : 0)) * 0.55 * speedRed;
      const maxD = 4.0 * dt;
      const sd = targetSteer - steerAngle;
      steerAngle = Math.abs(sd) < maxD ? targetSteer : steerAngle + Math.sign(sd) * maxD;

      // Engine force
      const engF = input.forward ? 800 : input.backward ? -300 : 0;
      vehicle.setWheelEngineForce(2, engF);
      vehicle.setWheelEngineForce(3, engF);

      // Brake
      const brakeF = input.backward ? 50 : 0;
      const handF = input.handbrake ? 150 : 0;
      for (let i = 0; i < 4; i++) vehicle.setWheelBrake(i, brakeF + handF);

      // Steering
      vehicle.setWheelSteering(0, steerAngle);
      vehicle.setWheelSteering(1, steerAngle);

      // Step physics
      vehicle.updateVehicle(dt);
      world.step();

      // Kill roll/pitch
      const r = carBody.rotation();
      const yaw = Math.atan2(2 * (r.w * r.y + r.z * r.x), 1 - 2 * (r.y * r.y + r.x * r.x));
      carBody.setRotation({ x: 0, y: Math.sin(yaw / 2), z: 0, w: Math.cos(yaw / 2) }, true);
      const av = carBody.angvel();
      carBody.setAngvel({ x: 0, y: av.y, z: 0 }, true);

      // Follow car with ground
      const p = carBody.translation();
      const dx = p.x - lastGX, dz = p.z - lastGZ;
      if (dx * dx + dz * dz > 25) { // rebuild every 5m
        rebuildGround(p.x, p.z);
      }

      // HUD
      let contacts = 0;
      for (let i = 0; i < 4; i++) if (vehicle.wheelIsInContact(i)) contacts++;

      yEl.textContent = p.y.toFixed(2);
      speedEl.textContent = speedKmh.toFixed(1);
      contactsEl.textContent = contacts;

      // Debug: first 20 frames
      frameCount++;
      if (frameCount <= 20) {
        console.log(`[test] frame ${frameCount} y=${p.y.toFixed(3)} contacts=${contacts} groundY=${(getHeight(p.x, p.z)).toFixed(2)}`);
      }

      // Reset if fallen off
      if (p.y < -10) {
        const h = getHeight(0, 0);
        carBody.setTranslation({ x: 0, y: h + wheelRadius + susRest + halfH * 0.5, z: 0 }, true);
        carBody.setLinvel({ x: 0, y: 0, z: 0 }, true);
      }
    }

    animate();
    console.log('[test-ground] Ready. WASD to drive, R to reset.');
  </script>
</body>
</html>
